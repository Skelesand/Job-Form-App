<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scan App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">TWG Scan Log</div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">Dashboard</a>
                <a href="/form" class="nav-item">Log New Job</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            {% block content %}
            <!-- Page specific HTML will inject here -->
            {% endblock %}
        </main>
    </div>

</body>
</html>
